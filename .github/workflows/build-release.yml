name: Build Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/clipforge.jks

      - name: Create signing.properties
         run: |
             echo "storeFile=../app/clipforge.jks" > android/signing.properties
             echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/signing.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/signing.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/signing.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clipforge-release
          path: android/app/build/outputs/apk/release/*.apk
